<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Offline AI OS — Dashboard</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Outfit:wght@300;400;500;600;700;800&family=JetBrains+Mono:wght@400;500&display=swap');

        :root {
            --bg-main: #060913;
            --bg-card: rgba(13, 20, 38, 0.45);
            --bg-card-hover: rgba(22, 32, 58, 0.65);
            --border-color: rgba(99, 102, 241, 0.12);
            --border-hover: rgba(6, 182, 212, 0.35);
            --text-main: #f8fafc;
            --text-muted: #94a3b8;
            
            --accent-primary: #06b6d4;      /* Electric Teal */
            --accent-secondary: #8b5cf6;    /* Cyber Purple */
            --accent-pink: #d946ef;         /* Neon Pink */
            --accent-gradient: linear-gradient(135deg, #0ea5e9, #06b6d4, #8b5cf6, #d946ef);
            --text-gradient: linear-gradient(135deg, #38bdf8, #06b6d4, #a78bfa, #f472b6);
            
            --color-success: #10b981;
            --color-warning: #f59e0b;
            --color-danger: #ef4444;
            --color-info: #06b6d4;
            
            --shadow-glow: 0 0 15px rgba(6, 182, 212, 0.2);
            --shadow-glow-purple: 0 0 15px rgba(139, 92, 246, 0.2);
            
            --glass-bg: rgba(13, 20, 38, 0.45);
            --glass-border: rgba(255, 255, 255, 0.05);
            --glass-blur: blur(16px);
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            font-family: 'Inter', sans-serif;
            background-color: var(--bg-main);
            background-image: 
                radial-gradient(at 0% 0%, rgba(99, 102, 241, 0.05) 0px, transparent 50%),
                radial-gradient(at 100% 0%, rgba(6, 182, 212, 0.05) 0px, transparent 50%),
                radial-gradient(at 50% 100%, rgba(139, 92, 246, 0.05) 0px, transparent 50%),
                linear-gradient(rgba(255, 255, 255, 0.005) 1px, transparent 1px),
                linear-gradient(90deg, rgba(255, 255, 255, 0.005) 1px, transparent 1px);
            background-size: 100% 100%, 100% 100%, 100% 100%, 24px 24px, 24px 24px;
            color: var(--text-main);
            height: 100vh;
            display: flex;
            flex-direction: column;
            overflow: hidden;
        }

        /* Scrollbar styling */
        ::-webkit-scrollbar {
            width: 5px;
            height: 5px;
        }
        ::-webkit-scrollbar-track {
            background: transparent;
        }
        ::-webkit-scrollbar-thumb {
            background: rgba(6, 182, 212, 0.15);
            border-radius: 4px;
        }
        ::-webkit-scrollbar-thumb:hover {
            background: rgba(6, 182, 212, 0.35);
        }

        header {
            background: rgba(13, 20, 38, 0.6);
            backdrop-filter: var(--glass-blur);
            border-bottom: 1px solid var(--border-color);
            padding: 14px 24px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            z-index: 100;
            box-shadow: 0 4px 30px rgba(0, 0, 0, 0.3);
        }

        .header-title-container {
            display: flex;
            align-items: center;
            gap: 12px;
        }

        .header-logo {
            width: 32px;
            height: 32px;
            background: var(--accent-gradient);
            border-radius: 8px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: 800;
            color: white;
            font-size: 16px;
            box-shadow: 0 0 15px rgba(6, 182, 212, 0.4);
            text-shadow: 0 1px 2px rgba(0,0,0,0.3);
            font-family: 'Outfit', sans-serif;
            animation: pulse-glow 3s infinite ease-in-out;
        }

        @keyframes pulse-glow {
            0%, 100% { box-shadow: 0 0 10px rgba(6, 182, 212, 0.3); }
            50% { box-shadow: 0 0 20px rgba(6, 182, 212, 0.6); }
        }

        h1 {
            font-size: 18px;
            font-weight: 700;
            letter-spacing: 0.5px;
            background: var(--text-gradient);
            -webkit-background-clip: text;
            background-clip: text;
            -webkit-text-fill-color: transparent;
            font-family: 'Outfit', sans-serif;
            text-transform: uppercase;
        }

        .header-status {
            display: flex;
            align-items: center;
            gap: 12px;
        }

        .status-pill {
            background: rgba(13, 20, 38, 0.5);
            border: 1px solid var(--border-color);
            padding: 6px 14px;
            border-radius: 20px;
            font-size: 11px;
            font-weight: 600;
            display: flex;
            align-items: center;
            gap: 8px;
            color: var(--text-muted);
            letter-spacing: 0.3px;
        }

        .status-pill span {
            color: var(--text-main);
        }

        .indicator {
            width: 7px;
            height: 7px;
            border-radius: 50%;
            background-color: var(--text-muted);
        }

        .indicator.active {
            background-color: var(--color-success);
            box-shadow: 0 0 10px var(--color-success);
            animation: pulse-indicator 2s infinite ease-in-out;
        }

        .indicator.offline {
            background-color: var(--color-danger);
            box-shadow: 0 0 10px var(--color-danger);
        }

        @keyframes pulse-indicator {
            0%, 100% { opacity: 0.6; }
            50% { opacity: 1; }
        }

        /* Dashboard Layout Grid */
        main {
            flex: 1;
            display: grid;
            grid-template-columns: 360px 1fr 390px;
            overflow: hidden;
            gap: 1px;
            background: var(--border-color);
        }

        /* Sidebar Panels */
        .sidebar {
            background: rgba(8, 12, 23, 0.4);
            backdrop-filter: var(--glass-blur);
            display: flex;
            flex-direction: column;
            overflow: hidden;
        }

        .sidebar.right {
            border-left: 1px solid var(--border-color);
        }

        .panel-header {
            padding: 16px 20px;
            border-bottom: 1px solid var(--border-color);
            display: flex;
            justify-content: space-between;
            align-items: center;
            font-size: 12px;
            font-weight: 700;
            letter-spacing: 1px;
            text-transform: uppercase;
            color: var(--text-muted);
            font-family: 'Outfit', sans-serif;
        }

        .panel-content {
            flex: 1;
            overflow-y: auto;
            padding: 16px;
        }

        /* Knowledge Explorer Styling */
        .topic-list-item {
            background: rgba(13, 20, 38, 0.35);
            border: 1px solid var(--border-color);
            padding: 14px 16px;
            border-radius: 10px;
            margin-bottom: 10px;
            cursor: pointer;
            position: relative;
            overflow: hidden;
            display: flex;
            flex-direction: column;
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
        }

        .topic-list-item::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            width: 3px;
            height: 100%;
            background: var(--accent-gradient);
            opacity: 0;
            transition: opacity 0.3s ease;
        }

        .topic-list-item:hover {
            background: rgba(22, 32, 58, 0.5);
            border-color: var(--border-hover);
            transform: translateY(-2px);
            box-shadow: var(--shadow-glow);
        }

        .topic-list-item:hover::before {
            opacity: 1;
        }

        .topic-list-item.active {
            border-color: var(--accent-primary);
            background: rgba(6, 182, 212, 0.08);
            box-shadow: var(--shadow-glow);
        }

        .topic-list-item.active::before {
            opacity: 1;
        }

        .delete-btn {
            background: transparent;
            border: none;
            color: var(--text-muted);
            cursor: pointer;
            opacity: 0;
            padding: 6px;
            border-radius: 6px;
            transition: all 0.2s ease;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .topic-list-item:hover .delete-btn {
            opacity: 1;
        }

        .delete-btn:hover {
            background: rgba(239, 68, 68, 0.15);
            color: var(--color-danger);
            transform: scale(1.1);
        }

        .topic-title {
            font-weight: 600;
            font-size: 14px;
            margin-bottom: 6px;
            color: var(--text-main);
            font-family: 'Outfit', sans-serif;
        }

        .topic-meta {
            font-size: 11px;
            color: var(--text-muted);
            font-weight: 500;
        }

        /* Chat Panel (Center) */
        .chat-container {
            display: flex;
            flex-direction: column;
            height: 100%;
            overflow: hidden;
            background: rgba(6, 9, 20, 0.3);
            backdrop-filter: var(--glass-blur);
        }

        .chat-messages {
            flex: 1;
            overflow-y: auto;
            padding: 24px;
            display: flex;
            flex-direction: column;
            gap: 18px;
        }

        .message-bubble {
            max-width: 85%;
            padding: 14px 18px;
            border-radius: 12px;
            line-height: 1.6;
            font-size: 14px;
            position: relative;
            animation: fadeIn 0.3s cubic-bezier(0.4, 0, 0.2, 1);
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(12px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .message-bubble.user {
            background: linear-gradient(135deg, #0ea5e9, #06b6d4);
            color: white;
            align-self: flex-end;
            border-bottom-right-radius: 2px;
            box-shadow: 0 4px 15px rgba(6, 182, 212, 0.25);
            text-shadow: 0 1px 1px rgba(0,0,0,0.1);
        }

        .message-bubble.assistant {
            background-color: rgba(13, 20, 38, 0.55);
            color: var(--text-main);
            border: 1px solid var(--border-color);
            align-self: flex-start;
            border-bottom-left-radius: 2px;
            box-shadow: 0 4px 20px rgba(0, 0, 0, 0.2);
        }

        .message-bubble pre {
            background: rgba(0, 0, 0, 0.35);
            border-left: 3px solid var(--accent-primary);
            border-radius: 8px;
            padding: 14px;
            margin-top: 10px;
            margin-bottom: 10px;
            overflow-x: auto;
            font-family: 'JetBrains Mono', monospace;
            font-size: 13px;
        }

        .message-bubble code {
            font-family: 'JetBrains Mono', monospace;
            font-size: 13px;
            background: rgba(6, 182, 212, 0.15);
            color: var(--accent-primary);
            padding: 2px 5px;
            border-radius: 4px;
        }

        .message-bubble pre code {
            background: transparent;
            color: inherit;
            padding: 0;
            border-radius: 0;
        }

        .message-intent {
            position: absolute;
            top: -10px;
            left: 12px;
            font-size: 9px;
            font-weight: 800;
            letter-spacing: 0.5px;
            background: rgba(13, 20, 38, 0.9);
            border: 1px solid var(--border-color);
            padding: 2px 8px;
            border-radius: 20px;
            color: var(--accent-primary);
            box-shadow: var(--shadow-glow);
            text-transform: uppercase;
        }

        .message-bubble.user .message-intent {
            left: auto;
            right: 12px;
            background: rgba(13, 20, 38, 0.9);
            color: var(--accent-pink);
            box-shadow: var(--shadow-glow-purple);
        }

        /* Chat Input Form */
        .chat-input-container {
            padding: 20px 24px;
            border-top: 1px solid var(--border-color);
            background: rgba(8, 12, 23, 0.5);
            backdrop-filter: var(--glass-blur);
        }

        .chat-form {
            display: flex;
            gap: 12px;
            align-items: center;
            background: rgba(13, 20, 38, 0.7);
            border: 1px solid var(--border-color);
            padding: 6px 14px;
            border-radius: 12px;
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
        }

        .chat-form:focus-within {
            border-color: var(--accent-primary);
            box-shadow: var(--shadow-glow);
            background: rgba(13, 20, 38, 0.95);
        }

        .console-prompt-prefix {
            font-family: 'JetBrains Mono', monospace;
            font-size: 13px;
            color: var(--accent-primary);
            opacity: 0.85;
            white-space: nowrap;
            user-select: none;
            text-shadow: 0 0 8px rgba(6, 182, 212, 0.4);
            font-weight: bold;
        }

        .chat-input {
            flex: 1;
            background: transparent;
            border: none;
            color: var(--text-main);
            padding: 10px 4px;
            font-size: 14px;
            outline: none;
            font-family: 'JetBrains Mono', monospace;
        }

        .chat-input::placeholder {
            color: var(--text-muted);
            opacity: 0.7;
        }

        .chat-options {
            display: flex;
            gap: 20px;
            margin-top: 12px;
            font-size: 12px;
            color: var(--text-muted);
            align-items: center;
            font-weight: 500;
        }

        .chat-options label {
            display: flex;
            align-items: center;
            gap: 8px;
            cursor: pointer;
            transition: color 0.2s ease;
        }

        .chat-options label:hover {
            color: var(--text-main);
        }

        .chat-options input[type="checkbox"] {
            accent-color: var(--accent-primary);
            cursor: pointer;
        }

        .btn {
            background: var(--accent-gradient);
            color: white;
            border: none;
            padding: 10px 18px;
            border-radius: 8px;
            font-weight: 700;
            font-size: 13px;
            cursor: pointer;
            transition: all 0.3s ease;
            display: flex;
            align-items: center;
            gap: 8px;
            font-family: 'Outfit', sans-serif;
            text-transform: uppercase;
            box-shadow: 0 2px 10px rgba(6, 182, 212, 0.25);
        }

        .btn:hover {
            transform: translateY(-1px);
            box-shadow: 0 4px 15px rgba(6, 182, 212, 0.45);
        }

        .btn:active {
            transform: translateY(0);
        }

        .btn:disabled {
            background: rgba(255, 255, 255, 0.08);
            border: 1px solid var(--border-color);
            color: var(--text-muted);
            cursor: not-allowed;
            opacity: 0.5;
            box-shadow: none;
        }

        .send-icon {
            transition: transform 0.2s ease;
        }

        .btn:hover .send-icon {
            transform: translate(1px, -1px);
        }

        /* Knowledge Graph Visualizer */
        .graph-panel {
            height: 270px;
            background: rgba(5, 7, 13, 0.5);
            border-radius: 12px;
            border: 1px solid var(--border-color);
            position: relative;
            overflow: hidden;
            margin-bottom: 20px;
        }

        .graph-svg {
            width: 100%;
            height: 100%;
            cursor: default;
        }

        .graph-controls {
            position: absolute;
            bottom: 10px;
            right: 10px;
            display: flex;
            gap: 4px;
            z-index: 20;
        }

        .graph-controls button {
            background: rgba(13, 20, 38, 0.85);
            border: 1px solid var(--border-color);
            color: var(--text-main);
            width: 26px;
            height: 26px;
            border-radius: 6px;
            font-size: 14px;
            font-weight: 700;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: all 0.2s cubic-bezier(0.4, 0, 0.2, 1);
            backdrop-filter: blur(4px);
            user-select: none;
        }

        .graph-controls button:hover {
            background: var(--accent-primary);
            border-color: var(--accent-primary);
            color: white;
            box-shadow: var(--shadow-glow);
            transform: translateY(-1px);
        }

        .graph-node {
            cursor: pointer;
            transition: all 0.2s ease;
        }

        .graph-node polygon {
            stroke: var(--bg-main);
            stroke-width: 2px;
            transition: transform 0.2s cubic-bezier(0.4, 0, 0.2, 1), filter 0.2s ease;
        }

        .graph-node:hover polygon {
            transform: scale(1.25);
        }

        .graph-node text {
            fill: var(--text-muted);
            font-size: 9px;
            font-weight: 600;
            pointer-events: none;
            transition: fill 0.2s ease, font-size 0.2s ease;
            font-family: 'Inter', sans-serif;
        }

        .graph-node:hover text {
            fill: var(--text-main);
            font-size: 9.5px;
            font-weight: 700;
        }

        .graph-link {
            stroke: rgba(255, 255, 255, 0.08);
            stroke-width: 1.5px;
        }

        .graph-link-flow {
            stroke-width: 1px;
            stroke-dasharray: 4, 12;
            animation: linkFlow 2s linear infinite;
        }

        @keyframes linkFlow {
            to { stroke-dashoffset: -16; }
        }

        /* Queue Manager list */
        .queue-item {
            background: rgba(13, 20, 38, 0.35);
            border: 1px solid var(--border-color);
            padding: 12px 16px;
            border-radius: 10px;
            margin-bottom: 10px;
            font-size: 13px;
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            position: relative;
            overflow: hidden;
        }

        .queue-item:hover {
            background: rgba(22, 32, 58, 0.5);
            border-color: var(--border-hover);
        }

        .queue-item.expanded {
            border-color: rgba(99, 102, 241, 0.3);
            box-shadow: 0 4px 15px rgba(0, 0, 0, 0.25);
            background: rgba(13, 20, 38, 0.55);
        }

        .queue-item-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 6px;
            font-family: 'Outfit', sans-serif;
        }

        .queue-toggle-arrow {
            display: inline-block;
            transition: transform 0.2s cubic-bezier(0.4, 0, 0.2, 1);
            font-size: 8px;
            color: var(--text-muted);
        }

        .queue-item-payload {
            font-family: 'JetBrains Mono', monospace;
            color: var(--text-muted);
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
            font-size: 11.5px;
            padding-left: 14px;
        }

        .badge {
            padding: 3px 8px;
            border-radius: 6px;
            font-size: 8.5px;
            font-weight: 800;
            text-transform: uppercase;
            letter-spacing: 0.5px;
            border: 1px solid transparent;
        }

        .badge.pending { 
            background-color: rgba(148, 163, 184, 0.1); 
            color: var(--text-muted); 
            border-color: rgba(148, 163, 184, 0.15);
        }
        .badge.running { 
            background-color: rgba(14, 165, 233, 0.15); 
            color: var(--accent-primary); 
            border-color: rgba(14, 165, 233, 0.25);
            animation: badge-pulse 1.5s infinite alternate;
        }
        .badge.completed { 
            background-color: rgba(16, 185, 129, 0.12); 
            color: var(--color-success); 
            border-color: rgba(16, 185, 129, 0.2);
        }
        .badge.failed { 
            background-color: rgba(239, 68, 68, 0.12); 
            color: var(--color-danger); 
            border-color: rgba(239, 68, 68, 0.2);
        }

        @keyframes badge-pulse {
            from { box-shadow: 0 0 4px rgba(14, 165, 233, 0.2); }
            to { box-shadow: 0 0 10px rgba(14, 165, 233, 0.5); }
        }

        .view-report-btn {
            background: rgba(6, 182, 212, 0.08);
            border: 1px solid rgba(6, 182, 212, 0.2);
            padding: 6px 12px;
            border-radius: 8px;
            color: var(--accent-primary);
            font-size: 11px;
            font-weight: 700;
            cursor: pointer;
            display: inline-flex;
            align-items: center;
            transition: all 0.2s ease;
            font-family: 'Outfit', sans-serif;
            text-transform: uppercase;
            letter-spacing: 0.3px;
        }
        .view-report-btn:hover {
            background: var(--accent-primary);
            color: white;
            box-shadow: var(--shadow-glow);
            border-color: var(--accent-primary);
        }

        /* Stats grid dashboard */
        .stats-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 12px;
            margin-bottom: 20px;
        }

        .stat-card {
            background: rgba(13, 20, 38, 0.35);
            border: 1px solid var(--border-color);
            padding: 16px 12px;
            border-radius: 12px;
            text-align: center;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            position: relative;
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
        }

        .stat-card:hover {
            border-color: var(--border-hover);
            transform: translateY(-2px);
            box-shadow: var(--shadow-glow);
            background: rgba(22, 32, 58, 0.5);
        }

        .radial-gauge-container {
            position: relative;
            width: 76px;
            height: 76px;
            margin-bottom: 8px;
        }

        .radial-gauge {
            width: 100%;
            height: 100%;
        }

        .gauge-overlay {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
        }

        .circle-bg {
            stroke: rgba(255, 255, 255, 0.04);
        }

        .circle-fill {
            transition: stroke-dasharray 0.8s cubic-bezier(0.4, 0, 0.2, 1);
        }

        .stat-val {
            font-size: 16px;
            font-weight: 800;
            color: var(--text-main);
            font-family: 'Outfit', sans-serif;
        }

        .stat-val.gradient-text {
            background: var(--text-gradient);
            -webkit-background-clip: text;
            background-clip: text;
            -webkit-text-fill-color: transparent;
            font-size: 22px;
            margin-bottom: 2px;
        }

        .stat-label {
            font-size: 9.5px;
            color: var(--text-muted);
            text-transform: uppercase;
            letter-spacing: 0.8px;
            font-weight: 700;
            font-family: 'Outfit', sans-serif;
        }

        /* Sparkline styling */
        .sparkline-card {
            align-items: stretch;
            justify-content: space-between;
            padding: 14px 12px;
        }

        .sparkline-info {
            display: flex;
            flex-direction: column;
            align-items: flex-start;
            text-align: left;
            margin-bottom: 6px;
        }

        .sparkline-chart-container {
            height: 32px;
            width: 100%;
            margin-top: auto;
        }

        .sparkline-svg {
            width: 100%;
            height: 100%;
            overflow: visible;
        }

        .sparkline-path {
            transition: d 0.5s ease;
        }

        .sparkline-area {
            transition: d 0.5s ease;
        }

        /* Modal / Popups for full content preview */
        .modal {
            position: fixed;
            top: 0;
            left: 0;
            width: 100vw;
            height: 100vh;

            display: flex;

            align-items: center;

            pointer-events: none;

        .modal-container {

            max-height: 80vh;
            border-radius: 16px;
            display: flex;
            flex-direction: column;
            overflow: hidden;

        .modal.active .modal-container {
            transform: scale(1);

        .modal-header {
            padding: 20px 24px;
            border-bottom: 1px solid var(--border-color);

            justify-content: space-between;
            align-items: center;

            background-clip: text;
            -webkit-text-fill-color: transparent;

        .modal-close {
            background: rgba(255, 255, 255, 0.04);

            color: var(--text-muted);

            width: 30px;
            height: 30px;
            border-radius: 8px;
            display: flex;
            align-items: center;
            justify-content: center;

        .modal-close:hover {
            background: rgba(239, 68, 68, 0.15);
            color: var(--color-danger);
            border-color: rgba(239, 68, 68, 0.2);
        }

        .modal-body {
            padding: 26px 28px;
            overflow-y: auto;
            font-size: 14px;
            line-height: 1.7;
            color: #e2e8f0;

        .modal-body h1, .modal-body h2, .modal-body h3 {
            margin-bottom: 14px;
            margin-top: 22px;
            color: var(--text-main);
            -webkit-text-fill-color: initial;
            background: none;
            font-family: 'Outfit', sans-serif;
        }

        .modal-body h1 { font-size: 20px; }
        .modal-body h2 { font-size: 17px; }
        .modal-body h3 { font-size: 15px; }

        .modal-body ul, .modal-body ol {
            margin-left: 24px;
            margin-bottom: 18px;
            display: flex;
            flex-direction: column;
            gap: 6px;

        .modal-body p {
            margin-bottom: 18px;
        }

        .modal-body pre {
            background: rgba(0, 0, 0, 0.4);
            border-left: 3px solid var(--accent-primary);
            padding: 16px;
            border-radius: 8px;
            font-family: 'JetBrains Mono', monospace;
            font-size: 13px;

            margin-bottom: 18px;

        .typing-loader {
            display: flex;
            gap: 4px;
            padding: 8px 12px;
            align-items: center;
        }

        .dot {
            width: 6px;
            height: 6px;
            background-color: var(--accent-primary);
            border-radius: 50%;
            animation: bounce 1.4s infinite ease-in-out both;
            box-shadow: var(--shadow-glow);
        }

        .dot:nth-child(1) { animation-delay: -0.32s; }
        .dot:nth-child(2) { animation-delay: -0.16s; }

        @keyframes bounce {
            0%, 80%, 100% { transform: scale(0); }
            40% { transform: scale(1.0); }
        }

        @keyframes blink-cursor {
            0%, 100% { opacity: 1; }
            50% { opacity: 0; }
        }

        .terminal-cursor {
            animation: blink-cursor 1s infinite;
            display: inline-block;
            color: var(--accent-primary);
            margin-left: 2px;

        .chat-input-container {
            position: relative;

        .command-suggestions {
            position: absolute;
            bottom: calc(100% + 5px);
            left: 24px;
            right: 24px;

            border-radius: 6px;
            font-family: 'JetBrains Mono', monospace;

            cursor: pointer;
            transition: all 0.2s ease;
            display: flex;
            justify-content: space-between;

        .suggestion-item:hover, .suggestion-item.active {

            color: var(--accent-primary);
        }

        .suggestion-item .cmd-desc {

    </style>
</head>
<body>

        <!-- RIGHT: Uptime & Task Queue -->

                <svg width="0" height="0" style="position: absolute;">
                    <defs>
                        <linearGradient id="gauge-grad-blue" x1="0%" y1="0%" x2="100%" y2="100%">

                        </linearGradient>

                            <stop offset="0%" stop-color="#06b6d4" stop-opacity="0.3" />

                                <path id="runs-gauge-path" class="circle-fill" stroke-dasharray="0, 100" d="M18 2.0845 a 15.9155 15.9155 0 0 1 0 31.831 a 15.9155 15.9155 0 0 1 0 -31.831" fill="none" stroke="url(#gauge-grad-blue)" stroke-width="2.5" stroke-linecap="round" />

    <!-- Modal for reading topics -->
    <div class="modal" id="topic-modal">
        <div class="modal-container">
            <div class="modal-header">
                <div class="modal-title" id="modal-title">Topic Title</div>
                <button class="modal-close" onclick="closeModal()">&times;</button>
            </div>
            <div class="modal-body" id="modal-body">
                Topic Content...
            </div>

    <script>
        const API_URL = "";

        // Elements
        const chatForm = document.getElementById("chat-form");
        const chatInput = document.getElementById("chat-input");
        const chatMessages = document.getElementById("chat-messages");
        const sendBtn = document.getElementById("send-btn");
        const typingIndicator = document.getElementById("typing-indicator");
        const queueCheckbox = document.getElementById("queue-checkbox");
        const priorityInput = document.getElementById("priority-input");
        const suggestionsBox = document.getElementById("command-suggestions");

        const AVAILABLE_COMMANDS = [
            { cmd: "ingest http", desc: "Scrape and add web page to Vector Store & Graph" },
            { cmd: "scrape http", desc: "Extract clean text content from web URL" },
            { cmd: "clear", desc: "Clear live console chat bubbles" },
            { cmd: "help", desc: "View available terminal commands" },
            { cmd: "status", desc: "Query Ollama health & stats" }
        ];

        let activeSuggestionIndex = -1;
        let filteredSuggestions = [];

        function showSuggestions(list) {
            filteredSuggestions = list;
            if (list.length === 0) {
                suggestionsBox.style.display = "none";
                activeSuggestionIndex = -1;
                return;
            }
            suggestionsBox.innerHTML = "";
            list.forEach((item, index) => {
                const div = document.createElement("div");
                div.className = `suggestion-item ${index === activeSuggestionIndex ? 'active' : ''}`;
                div.innerHTML = `
                    <span>${item.cmd}</span>
                    <span class="cmd-desc">${item.desc}</span>
                `;
                div.onclick = () => {
                    chatInput.value = item.cmd + " ";
                    suggestionsBox.style.display = "none";
                    chatInput.focus();
                };
                suggestionsBox.appendChild(div);
            });
            suggestionsBox.style.display = "flex";
        }

        chatInput.addEventListener("input", (e) => {
            const val = chatInput.value.trim().toLowerCase();
            if (!val) {
                showSuggestions([]);
                return;
            }
            
            const matched = AVAILABLE_COMMANDS.filter(c => 
                c.cmd.startsWith(val) || (val.startsWith(c.cmd.split(" ")[0]) && c.cmd.startsWith(val.split(" ")[0]))
            );
            
            showSuggestions(matched);
        });

        chatInput.addEventListener("keydown", (e) => {
            if (suggestionsBox.style.display === "none") return;

            if (e.key === "ArrowDown") {
                e.preventDefault();
                activeSuggestionIndex = (activeSuggestionIndex + 1) % filteredSuggestions.length;
                showSuggestions(filteredSuggestions);
            } else if (e.key === "ArrowUp") {
                e.preventDefault();
                activeSuggestionIndex = (activeSuggestionIndex - 1 + filteredSuggestions.length) % filteredSuggestions.length;
                showSuggestions(filteredSuggestions);
            } else if (e.key === "Tab" || (e.key === "Enter" && activeSuggestionIndex !== -1)) {
                e.preventDefault();
                if (activeSuggestionIndex !== -1) {
                    chatInput.value = filteredSuggestions[activeSuggestionIndex].cmd + " ";
                    showSuggestions([]);
                }
            } else if (e.key === "Escape") {
                showSuggestions([]);
            }
        });

        document.addEventListener("click", (e) => {
            if (e.target !== chatInput && e.target !== suggestionsBox && !suggestionsBox.contains(e.target)) {
                showSuggestions([]);
            }
        });
        
        // Status Indicators
        const ollamaIndicator = document.getElementById("ollama-indicator");
        const ollamaText = document.getElementById("ollama-text");
        const kbCountBadge = document.getElementById("kb-count");
        const vectorCountBadge = document.getElementById("vector-count");

        // Metrics
        const statInteractions = document.getElementById("stat-interactions");
        const statSuccess = document.getElementById("stat-success");
        const statLatency = document.getElementById("stat-latency");
        const statKbhits = document.getElementById("stat-kbhits");

        // Lists
        const knowledgeList = document.getElementById("knowledge-list");
        const queueList = document.getElementById("queue-list");

        // Modal
        const topicModal = document.getElementById("topic-modal");
        const modalTitle = document.getElementById("modal-title");
        const modalBody = document.getElementById("modal-body");

        // App State
        let topicsData = {};

        // Format Markdown to basic HTML
        function formatMarkdown(text) {
            if (!text) return "";
            
            // Format headers
            text = text.replace(/^### (.*$)/gim, '<h3>$1</h3>');
            text = text.replace(/^## (.*$)/gim, '<h2>$1</h2>');
            text = text.replace(/^# (.*$)/gim, '<h1>$1</h1>');
            
            // Format bold and code blocks
            text = text.replace(/\*\*(.*?)\*\*/g, '<strong>$1</strong>');
            
            // Format code fences
            text = text.replace(/```(?:[a-zA-Z0-9]+)?\n([\s\S]*?)\n```/gm, '<pre><code>$1</code></pre>');
            text = text.replace(/`(.*?)`/g, '<code>$1</code>');
            
            // Format lists
            text = text.replace(/^\s*-\s+(.*$)/gim, '<li>$1</li>');
            text = text.replace(/(<li>.*<\/li>)/im, '<ul>$1</ul>');
            
            // Convert double linebreaks to paragraphs
            text = text.replace(/\n\n/g, '</p><p>');
            
            return '<p>' + text + '</p>';
        }

        // Initialize Chat History
        async function loadHistory() {
            try {
                const res = await fetch(`${API_URL}/api/history`);
                const data = await res.json();
                chatMessages.innerHTML = "";
                
                if (data.exchanges && data.exchanges.length > 0) {
                    data.exchanges.forEach(ex => {
                        appendMessage(ex.user, "user");
                        appendMessage(ex.assistant, "assistant");
                    });
                } else {
                    appendMessage("Hello! I am your Offline AI OS. How can I help you today?", "assistant");
                }
            } catch (err) {
                console.error("Failed to load chat history", err);
                appendMessage("Hello! I am your Offline AI OS. How can I help you today?", "assistant");
            }
        }

        // Load Chat Sessions List
        async function loadSessions() {
            try {
                const res = await fetch(`${API_URL}/api/sessions`);
                const sessions = await res.json();
                const sessionsList = document.getElementById("sessions-list");
                if (!sessionsList) return;
                
                sessionsList.innerHTML = "";
                if (sessions.length === 0) {
                    sessionsList.innerHTML = '<div class="topic-meta" style="padding: 10px;">No saved conversations.</div>';
                    return;
                }

                sessions.forEach(session => {
                    const div = document.createElement("div");
                    div.className = "topic-list-item";
                    
                    const date = new Date(session.timestamp * 1000);
                    const timeStr = date.toLocaleString();
                    
                    div.innerHTML = `
                        <div style="display: flex; justify-content: space-between; align-items: center; width: 100%; gap: 8px;">
                            <div class="session-info-click" style="flex: 1; min-width: 0; cursor: pointer;">
                                <div class="topic-title" style="white-space: nowrap; overflow: hidden; text-overflow: ellipsis; max-width: 100%;" title="${session.title}">${session.title}</div>
                                <div class="topic-meta">Exchanges: ${session.exchanges_count} | ${timeStr}</div>
                            </div>
                            <button class="delete-btn" style="z-index: 10; margin-left: auto;">&times;</button>
                        </div>
                    `;
                    
                    const infoBlock = div.querySelector(".session-info-click");
                    infoBlock.onclick = () => loadChatSession(session.filename);
                    
                    const delBtn = div.querySelector(".delete-btn");
                    delBtn.onclick = (e) => {
                        e.stopPropagation();
                        deleteChatSession(session.filename);
                    };

                    sessionsList.appendChild(div);
                });
            } catch (err) {
                console.error("Failed to load sessions list", err);
            }
        }

        // Create New Chat (Reset UI and backend context)
        async function createNewChat() {
            try {
                const res = await fetch(`${API_URL}/api/sessions/new`, {
                    method: "POST"
                });
                const data = await res.json();
                if (data.status === "success") {
                    chatMessages.innerHTML = "";
                    appendMessage("Hello! I am your Offline AI OS. How can I help you today?", "assistant");
                    chatInput.value = "";
                    await loadHistory();
                    await loadSessions();
                    await loadStatus();
                } else {
                    alert("Failed to initialize new conversation.");
                }
            } catch (err) {
                console.error("Error creating new chat:", err);
            }
        }

        // Load a selected chat session
        async function loadChatSession(filename) {
            try {
                const res = await fetch(`${API_URL}/api/sessions/load`, {
                    method: "POST",
                    headers: { "Content-Type": "application/json" },
                    body: JSON.stringify({ filename: filename })
                });
                const data = await res.json();
                if (data.status === "success") {
                    chatMessages.innerHTML = "";
                    if (data.exchanges && data.exchanges.length > 0) {
                        data.exchanges.forEach(ex => {
                            appendMessage(ex.user, "user");
                            appendMessage(ex.assistant, "assistant");
                        });
                    } else {
                        appendMessage("Hello! I am your Offline AI OS. How can I help you today?", "assistant");
                    }
                    await loadSessions();
                    await loadStatus();
                } else {
                    alert("Failed to load chat session.");
                }
            } catch (err) {
                console.error("Error loading chat session:", err);
            }
        }

        // Delete a saved chat session
        async function deleteChatSession(filename) {

        // Historical Metrics state for Sparklines
        let latencyHistory = [];
        let kbhitsHistory = [];

        function drawSparkline(pathId, areaId, history, defaultMax = 100) {
            const path = document.getElementById(pathId);
            const area = document.getElementById(areaId);
            if (!path || !area) return;

            // Seed with fake initial data for aesthetic look
            let data = [...history];
            if (data.length === 0) {
                data = [0, 0, 0, 0, 0];
            } else if (data.length === 1) {
                data = [data[0], data[0], data[0]];
            }

            const max = Math.max(defaultMax, ...data) || 1;
            const points = data.map((val, index) => {
                const x = (index / (data.length - 1)) * 80;
                const y = 30 - ((val / max) * 22) - 2; // Padding from top/bottom
                return { x, y };
            });

            const dPath = points.map((p, i) => `${i === 0 ? 'M' : 'L'} ${p.x.toFixed(1)} ${p.y.toFixed(1)}`).join(' ');
            path.setAttribute('d', dPath);

            const dArea = `${dPath} L 80 30 L 0 30 Z`;
            area.setAttribute('d', dArea);
        }

        // Render SVG Knowledge Graph with Spring Physics Simulation
        let activeNodes = [];
        let activeLinks = [];
        let animationFrameId = null;
        let draggedNode = null;

        // Zoom/Pan State
        let zoomScale = 1;
        let panX = 0;
        let panY = 0;

        function zoomGraph(factor) {
            zoomScale = Math.max(0.3, Math.min(4, zoomScale * factor));
            updateGraphTransform();
        }

        function resetGraphView() {
            zoomScale = 1;
            panX = 0;
            panY = 0;

        }

        function updateGraphTransform() {
            const container = document.getElementById("graph-g-container");
            if (container) {
                container.setAttribute("transform", `translate(${panX}, ${panY}) scale(${zoomScale})`);
            }
        }

        function getNodeColorClass(nodeId, content) {
            const idLower = nodeId.toLowerCase();
            const contentLower = (content || "").toLowerCase();
            
            if (
                idLower.startsWith("http://") || 
                idLower.startsWith("https://") || 
                idLower.includes(".com") || 
                idLower.includes(".org") || 
                idLower.includes(".net") ||
                idLower.includes("file_reader") || 
                idLower.includes("file_writer") || 
                idLower.includes("grep_search") || 
                idLower.includes("run python")
            ) {
                return "var(--accent-primary)"; // Electric Teal
            }
            
            if (
                idLower.includes("hello") || 
                idLower.includes("hi") || 
                idLower.includes("hey") || 
                idLower.includes("thanks") || 
                idLower.includes("linkedin") || 
                idLower.includes("creative") ||
                contentLower.includes("linkedin") || 
                contentLower.includes("creative writing") || 
                contentLower.includes("blog post")
            ) {
                return "var(--color-success)"; // Green
            }
            
            if (
                idLower.includes("workflow") || 
                idLower.includes("study") || 
                idLower.includes("analyze") || 
                idLower.includes("report") || 
                idLower.includes("research") ||
                contentLower.includes("workflow") || 
                contentLower.includes("analysis report")
            ) {
                return "var(--accent-secondary)"; // Purple
            }
            
            return "var(--color-warning)"; // Orange

        async function loadGraph() {
            try {
                const res = await fetch(`${API_URL}/api/graph`);
                const graph = await res.json();
                const svg = document.getElementById("graph-svg");
                svg.innerHTML = "";

                if (!graph.nodes || graph.nodes.length === 0) {
                    activeNodes = [];
                    activeLinks = [];
                    if (animationFrameId) {
                        cancelAnimationFrame(animationFrameId);
                        animationFrameId = null;
                    }
                    return;
                }

                const width = svg.clientWidth || 320;
                const height = svg.clientHeight || 230;
                const centerX = width / 2;
                const centerY = height / 2;

                // Stop previous simulation
                if (animationFrameId) {
                    cancelAnimationFrame(animationFrameId);
                    animationFrameId = null;
                }

                // Map old node positions
                const oldPositions = {};
                activeNodes.forEach(n => {
                    oldPositions[n.id] = { x: n.x, y: n.y, vx: n.vx, vy: n.vy };
                });

                // Prepare new nodes
                activeNodes = graph.nodes.map((node, i) => {
                    const old = oldPositions[node.id];
                    if (old) {
                        return { id: node.id, x: old.x, y: old.y, vx: old.vx, vy: old.vy };
                    } else {
                        const angle = (i * 2 * Math.PI) / graph.nodes.length;
                        const radius = Math.min(width, height) * 0.3;
                        return {
                            id: node.id,
                            x: centerX + radius * Math.cos(angle) + (Math.random() - 0.5) * 10,
                            y: centerY + radius * Math.sin(angle) + (Math.random() - 0.5) * 10,
                            vx: 0,
                            vy: 0
                        };
                    }
                });

                // Prepare links
                activeLinks = [];
                graph.links.forEach(link => {
                    const sourceNode = activeNodes.find(n => n.id === link.source);
                    const targetNode = activeNodes.find(n => n.id === link.target);
                    if (sourceNode && targetNode) {
                        activeLinks.push({ source: sourceNode, target: targetNode });
                    }
                });

                // Create Top Level Container for Zoom/Pan
                const gContainer = document.createElementNS("http://www.w3.org/2000/svg", "g");
                gContainer.setAttribute("id", "graph-g-container");
                svg.appendChild(gContainer);

                // Add transparent backdrop rect to catch drag/pan clicks in background
                const backdrop = document.createElementNS("http://www.w3.org/2000/svg", "rect");
                backdrop.setAttribute("width", "5000");
                backdrop.setAttribute("height", "5000");
                backdrop.setAttribute("x", "-2500");
                backdrop.setAttribute("y", "-2500");
                backdrop.setAttribute("fill", "transparent");
                backdrop.setAttribute("class", "zoom-bg");
                gContainer.appendChild(backdrop);

                const linksGroup = document.createElementNS("http://www.w3.org/2000/svg", "g");
                gContainer.appendChild(linksGroup);

                const nodesGroup = document.createElementNS("http://www.w3.org/2000/svg", "g");
                gContainer.appendChild(nodesGroup);

                // Render Dual Links (Base Line + Pulse Flow line overlay)
                const linkElements = activeLinks.map(link => {
                    const baseLine = document.createElementNS("http://www.w3.org/2000/svg", "line");
                    baseLine.setAttribute("class", "graph-link");
                    linksGroup.appendChild(baseLine);

                    const flowLine = document.createElementNS("http://www.w3.org/2000/svg", "line");
                    flowLine.setAttribute("class", "graph-link-flow");
                    const color = getNodeColorClass(link.target.id, topicsData[link.target.id]);
                    flowLine.setAttribute("stroke", color);
                    flowLine.setAttribute("opacity", "0.75");
                    linksGroup.appendChild(flowLine);

                    return { base: baseLine, flow: flowLine, link: link };
                });

                // Render Hexagonal Nodes
                const nodeElements = activeNodes.map(node => {
                    const g = document.createElementNS("http://www.w3.org/2000/svg", "g");
                    g.setAttribute("class", "graph-node");
                    
                    g.onclick = () => {
                        const content = topicsData[node.id];
                        if (content) {
                            showTopic(node.id, content, "Auto-mapped Relation");
                        }
                    };

                    const color = getNodeColorClass(node.id, topicsData[node.id]);

                    // Hexagon polygon: radius=9px
                    const polygon = document.createElementNS("http://www.w3.org/2000/svg", "polygon");
                    polygon.setAttribute("points", "0,-9 8,-4.5 8,4.5 0,9 -8,4.5 -8,-4.5");
                    polygon.style.fill = color;
                    polygon.style.stroke = "var(--bg-main)";
                    polygon.style.strokeWidth = "2px";
                    polygon.style.filter = `drop-shadow(0 0 5px ${color})`;

                    const text = document.createElementNS("http://www.w3.org/2000/svg", "text");
                    const displayLabel = node.id.length > 15 ? node.id.substring(0, 12) + "..." : node.id;
                    text.textContent = displayLabel;
                    text.setAttribute("style", "text-shadow: 0 1px 3px rgba(0,0,0,0.9);");

                    const tooltip = document.createElementNS("http://www.w3.org/2000/svg", "title");
                    tooltip.textContent = node.id;
                    g.appendChild(tooltip);

                    g.appendChild(polygon);
                    g.appendChild(text);
                    nodesGroup.appendChild(g);

                    g.addEventListener("mousedown", (e) => {
                        e.stopPropagation();
                        draggedNode = node;
                        node.vx = 0;
                        node.vy = 0;
                    });

                    return { element: g, node: node, text: text, polygon: polygon };
                });

                // Mouse events for Panning and Zooming
                let isPanning = false;
                let startX = 0;
                let startY = 0;

                svg.addEventListener("mousedown", (e) => {
                    if (e.target.tagName === "svg" || e.target.id === "graph-svg" || e.target.classList.contains("zoom-bg")) {
                        isPanning = true;
                        startX = e.clientX - panX;
                        startY = e.clientY - panY;
                        svg.style.cursor = "grabbing";
                    }
                });

                svg.addEventListener("mousemove", (e) => {
                    if (draggedNode) {
                        const rect = svg.getBoundingClientRect();
                        // Scale coordinate displacements based on active zoom factor
                        draggedNode.x = (e.clientX - rect.left - panX) / zoomScale;
                        draggedNode.y = (e.clientY - rect.top - panY) / zoomScale;
                        draggedNode.vx = 0;
                        draggedNode.vy = 0;
                    } else if (isPanning) {
                        panX = e.clientX - startX;
                        panY = e.clientY - startY;
                        updateGraphTransform();
                    }
                });

                window.addEventListener("mouseup", () => {
                    draggedNode = null;
                    isPanning = false;
                    svg.style.cursor = "default";
                });

                // Support Wheel zoom
                svg.addEventListener("wheel", (e) => {
                    e.preventDefault();
                    const intensity = 0.06;
                    const rect = svg.getBoundingClientRect();
                    const mouseX = e.clientX - rect.left;
                    const mouseY = e.clientY - rect.top;
                    
                    let newScale = zoomScale + (e.deltaY < 0 ? intensity : -intensity);
                    newScale = Math.max(0.3, Math.min(4, newScale));
                    
                    // Center scaling relative to cursor position
                    panX = mouseX - (mouseX - panX) * (newScale / zoomScale);
                    panY = mouseY - (mouseY - panY) * (newScale / zoomScale);
                    zoomScale = newScale;
                    
                    updateGraphTransform();
                });

                // Apply current transformations immediately
                updateGraphTransform();

                // Force layout parameters
                const repulsion = 450;
                const springLength = 80;
                const springStrength = 0.04;
                const gravity = 0.008;
                const friction = 0.82;
                const collisionRadius = 25;

                // Physics Simulation Loop
                function tick() {
                    const w = svg.clientWidth || 320;
                    const h = svg.clientHeight || 230;
                    const cx = w / 2;
                    const cy = h / 2;

                    // 1. Repulsion force between all nodes
                    for (let i = 0; i < activeNodes.length; i++) {
                        const n1 = activeNodes[i];
                        for (let j = i + 1; j < activeNodes.length; j++) {
                            const n2 = activeNodes[j];
                            const dx = n1.x - n2.x;
                            const dy = n1.y - n2.y;
                            const dist = Math.sqrt(dx * dx + dy * dy) + 0.1;
                            if (dist < 200) {
                                const force = repulsion / (dist * dist);
                                const fX = force * (dx / dist);
                                const fY = force * (dy / dist);
                                
                                if (n1 !== draggedNode) {
                                    n1.vx += fX;
                                    n1.vy += fY;
                                }
                                if (n2 !== draggedNode) {
                                    n2.vx -= fX;
                                    n2.vy -= fY;
                                }
                             }
                        }
                    }

                    // 2. Attraction force along links
                    activeLinks.forEach(link => {
                        const n1 = link.source;
                        const n2 = link.target;
                        const dx = n1.x - n2.x;
                        const dy = n1.y - n2.y;
                        const dist = Math.sqrt(dx * dx + dy * dy) + 0.1;
                        const force = (dist - springLength) * springStrength;
                        const fX = force * (dx / dist);
                        const fY = force * (dy / dist);

                        if (n1 !== draggedNode) {
                            n1.vx -= fX;
                            n1.vy -= fY;
                        }
                        if (n2 !== draggedNode) {
                            n2.vx += fX;
                            n2.vy += fY;
                        }
                    });

                    // 3. Collision force to prevent node overlaps
                    const minDist = collisionRadius * 2;
                    for (let i = 0; i < activeNodes.length; i++) {
                        const n1 = activeNodes[i];
                        for (let j = i + 1; j < activeNodes.length; j++) {
                            const n2 = activeNodes[j];
                            const dx = n1.x - n2.x;
                            const dy = n1.y - n2.y;
                            const dist = Math.sqrt(dx * dx + dy * dy) + 0.1;
                            if (dist < minDist) {
                                const overlap = minDist - dist;
                                const fX = (overlap * 0.5) * (dx / dist);
                                const fY = (overlap * 0.5) * (dy / dist);
                                if (n1 !== draggedNode) {
                                    n1.x += fX;
                                    n1.y += fY;
                                    n1.vx += fX * 0.2;
                                    n1.vy += fY * 0.2;
                                }
                                if (n2 !== draggedNode) {
                                    n2.x -= fX;
                                    n2.y -= fY;
                                    n2.vx -= fX * 0.2;
                                    n2.vy -= fY * 0.2;
                                }
                            }
                        }
                    }

                    // 4. Center gravity & velocity dampening
                    activeNodes.forEach(node => {
                        if (node === draggedNode) return;

                        const dx = node.x - cx;
                        const dy = node.y - cy;
                        node.vx -= dx * gravity;
                        node.vy -= dy * gravity;

                        node.vx *= friction;
                        node.vy *= friction;
                        node.x += node.vx;
                        node.y += node.vy;

                        // Bounds clamping relative to larger virtual space
                        node.x = Math.max(-1000, Math.min(1000 + w, node.x));
                        node.y = Math.max(-1000, Math.min(1000 + h, node.y));
                    });

                    // 5. Update attributes in DOM
                    linkElements.forEach(item => {
                        item.base.setAttribute("x1", item.link.source.x);
                        item.base.setAttribute("y1", item.link.source.y);
                        item.base.setAttribute("x2", item.link.target.x);
                        item.base.setAttribute("y2", item.link.target.y);

                        item.flow.setAttribute("x1", item.link.source.x);
                        item.flow.setAttribute("y1", item.link.source.y);
                        item.flow.setAttribute("x2", item.link.target.x);
                        item.flow.setAttribute("y2", item.link.target.y);
                    });

                    nodeElements.forEach(item => {
                        const node = item.node;
                        item.element.setAttribute("transform", `translate(${node.x}, ${node.y})`);
                        
                        if (node.x < cx) {
                            item.text.setAttribute("x", -12);
                            item.text.setAttribute("text-anchor", "end");
                        } else {
                            item.text.setAttribute("x", 12);
                            item.text.setAttribute("text-anchor", "start");
                        }
                        item.text.setAttribute("y", 3);
                    });

                    animationFrameId = requestAnimationFrame(tick);
                }

                tick();

            } catch (err) {
                console.error("Failed to load graph", err);
            }
        }

                const res = await fetch(`${API_URL}/api/chat`, {
                    method: "POST",
                    headers: { "Content-Type": "application/json" },
                    body: JSON.stringify({
                        prompt: text,
                        background: runInBg,
                        priority: priority
                    })
                });

                if (runInBg) {
                    const data = await res.json();
                    appendMessage(`[Queued System] ${data.message} (Task ID: ${data.task_id.substring(0,8)}...)`, "assistant", "SYSTEM");
                    loadQueue();
                } else {
                    const reader = res.body.getReader();
                    const decoder = new TextDecoder();
                    let buffer = "";
                    let assistantBubble = null;
                    let assistantText = "";
                    let intentVal = "";
                    let knowledgeHit = false;

                    streamLoop: while (true) {
                        const { value, done } = await reader.read();
                        if (done) break;

                        buffer += decoder.decode(value, { stream: true });
                        const lines = buffer.split("\n");
                        buffer = lines.pop(); // Keep partial line in buffer

                        for (const line of lines) {
                            const trimmed = line.trim();
                            if (trimmed.startsWith("data: ")) {
                                const jsonStr = trimmed.substring(6).trim();
                                if (!jsonStr) continue;
                                try {
                                    const parsed = JSON.parse(jsonStr);
                                    if (parsed.status) {
                                        typingIndicator.innerText = parsed.status;
                                        typingIndicator.style.display = "inline";
                                        continue;
                                    }
                                    if (parsed.done) {
                                        if (parsed.intent) intentVal = parsed.intent;
                                        if (parsed.knowledge_hit !== undefined) knowledgeHit = parsed.knowledge_hit;
                                        if (parsed.ingested_topic) ingestedTopic = parsed.ingested_topic;
                                        try { reader.cancel(); } catch(e) {}
                                        break streamLoop;
                                    } else {
                                        const token = parsed.token || "";
                                        if (parsed.intent) intentVal = parsed.intent;
                                        if (parsed.knowledge_hit !== undefined) knowledgeHit = parsed.knowledge_hit;
                                        if (parsed.ingested_topic) ingestedTopic = parsed.ingested_topic;

                                        assistantText += token;

                                        if (!assistantBubble) {
                                            assistantBubble = document.createElement("div");
                                            assistantBubble.className = "message-bubble assistant";
                                            chatMessages.appendChild(assistantBubble);
                                        }

                                        assistantBubble.innerHTML = formatMarkdown(assistantText);

                                        if (intentVal) {
                                            const badge = document.createElement("span");
                                            badge.className = "message-intent";
                                            badge.innerText = intentVal;
                                            assistantBubble.appendChild(badge);
                                        } else if (knowledgeHit) {
                                            const badge = document.createElement("span");
                                            badge.className = "message-intent";
                                            badge.innerText = "KNOWLEDGE";
                                            assistantBubble.appendChild(badge);
                                        }

                                        chatMessages.scrollTop = chatMessages.scrollHeight;
                                    }
                                } catch (err) {
                                    console.error("Error parsing stream line:", err, jsonStr);
                                }
                            }
                        }
                    }

                    // Process trailing buffer
                    if (buffer && buffer.trim().startsWith("data: ")) {
                        const jsonStr = buffer.trim().substring(6).trim();
                        try {
                            const parsed = JSON.parse(jsonStr);
                            if (parsed.status) {
                                typingIndicator.innerText = parsed.status;
                                typingIndicator.style.display = "inline";
                            } else if (parsed.done) {
                                if (parsed.ingested_topic) ingestedTopic = parsed.ingested_topic;
                            } else if (!parsed.done) {
                                const token = parsed.token || "";
                                if (parsed.intent) intentVal = parsed.intent;
                                if (parsed.knowledge_hit !== undefined) knowledgeHit = parsed.knowledge_hit;
                                if (parsed.ingested_topic) ingestedTopic = parsed.ingested_topic;

                                assistantText += token;

                                if (!assistantBubble) {
                                    assistantBubble = document.createElement("div");
                                    assistantBubble.className = "message-bubble assistant";
                                    chatMessages.appendChild(assistantBubble);
                                }

                                assistantBubble.innerHTML = formatMarkdown(assistantText);

                                if (intentVal) {
                                    const badge = document.createElement("span");
                                    badge.className = "message-intent";
                                    badge.innerText = intentVal;
                                    assistantBubble.appendChild(badge);
                                } else if (knowledgeHit) {
                                    const badge = document.createElement("span");
                                    badge.className = "message-intent";
                                    badge.innerText = "KNOWLEDGE";
                                    assistantBubble.appendChild(badge);
                                }

                                chatMessages.scrollTop = chatMessages.scrollHeight;
                            }
                        } catch (err) {}
                    }

                    // If it cleared
                    if (text.toLowerCase() === "clear") {
                        chatMessages.innerHTML = "";
                        appendMessage("Conversation cleared.", "assistant");
                    }
                }
            } catch (err) {
                console.error(err);
                appendMessage("Failed to execute request. Ensure web server and Ollama are active.", "assistant", "ERROR");
            } finally {
                sendBtn.disabled = false;
                typingIndicator.style.display = "none";
                // Reload metadata dashboard
                await loadStatus();
                await loadKnowledge();
                await loadGraph();
                await loadSessions();

                if (ingestedTopic) {
                    const content = topicsData[ingestedTopic];
                    if (content) {
                        showTopic(ingestedTopic, content, "Scraped & Ingested Content");
                    }
                    ingestedTopic = null;
                }
            }
        });

        // View background report content inside topic modal
        async function viewReport(filePath) {
            try {
                const res = await fetch(filePath);
                if (!res.ok) throw new Error("File not found");
                const content = await res.text();
                const title = filePath.split("/").pop().replace(/_/g, " ").replace(".md", "");
                showTopic(title, content, "Completed Queue Report");
            } catch (err) {
                console.error("Failed to load report:", err);
                alert("Could not load the report file. It might still be generating or has been removed.");
            }
        }

        // Delete a single knowledge topic
        async function deleteTopic(topic) {
            if (!confirm(`Are you sure you want to delete the topic "${topic}"?`)) return;
            try {
                const res = await fetch(`${API_URL}/api/knowledge/delete`, {
                    method: "POST",
                    headers: { "Content-Type": "application/json" },
                    body: JSON.stringify({ topic: topic })
                });
                const data = await res.json();
                if (data.status === "success") {
                    loadKnowledge();
                    loadGraph();
                    loadStatus();
                } else {
                    alert("Failed to delete topic.");
                }
            } catch (err) {
                console.error("Error deleting topic:", err);
            }
        }

        // Clear all knowledge base history
        async function clearAllKnowledge() {
            if (!confirm("Are you sure you want to delete the entire knowledge base history? This will wipe out all topics, embeddings, and graph relations. This cannot be undone!")) return;
            try {
                const res = await fetch(`${API_URL}/api/knowledge/clear`, {
                    method: "POST"
                });
                const data = await res.json();
                if (data.status === "success") {
                    loadKnowledge();
                    loadGraph();
                    loadStatus();
                } else {
                    alert("Failed to clear knowledge base.");
                }
            } catch (err) {
                console.error("Error clearing knowledge base:", err);
            }
        }

        // Initialize App
        async function init() {
            await loadHistory();
            await loadStatus();
            await loadKnowledge();
            await loadQueue();
            await loadGraph();
            await loadSessions();

            // Refresh queue/status every 5 seconds
            setInterval(() => {
                loadStatus();
                loadQueue();
            }, 5000);
        }

        // Run
        init();
    </script>
</body>
